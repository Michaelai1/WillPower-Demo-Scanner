<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f1115">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Will Power Reports">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="format-detection" content="telephone=no">
<title>Will Power — Field Reports</title>
<link rel="icon" type="image/png" href="willpower-logo.png">
<link rel="apple-touch-icon" href="willpower-logo.png">
<style>
:root {
  --bg: #0f1115;
  --bg-elev: #181b22;
  --bg-card: #1e222b;
  --border: #2a2f3a;
  --border-strong: #383f4d;
  --text: #f3f4f6;
  --text-2: #b6bcc8;
  --text-3: #7f8694;
  --gold: #F5B301;
  --gold-soft: rgba(245,179,1,0.12);
  --red: #ef4444;
  --orange: #f97316;
  --yellow: #eab308;
  --blue: #3b82f6;
  --green: #10b981;
  --gray: #6b7280;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); }
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  font-size: 15px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  padding-bottom: calc(40px + var(--safe-bottom));
  min-height: 100vh;
}

/* ── HEADER ────────────────────────────────────────────────── */
header {
  position: sticky; top: 0; z-index: 10;
  background: rgba(15, 17, 21, 0.85);
  -webkit-backdrop-filter: blur(14px);
  backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--border);
  padding: calc(var(--safe-top) + 10px) 16px 0;
}
.hd-row { display: flex; align-items: center; gap: 12px; padding-bottom: 10px; }
.hd-logo {
  width: 40px; height: 40px;
  background: #fff; border-radius: 8px; padding: 4px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.hd-logo img { width: 100%; height: 100%; object-fit: contain; }
.hd-title { font-size: 17px; font-weight: 700; letter-spacing: -0.01em; }
.hd-sub { font-size: 12px; color: var(--text-3); margin-top: 1px; }
.hd-refresh {
  margin-left: auto;
  background: none; border: 1px solid var(--border-strong); color: var(--text-2);
  padding: 7px 10px; border-radius: 8px; font: inherit; font-size: 12px; font-weight: 600;
  cursor: pointer; display: flex; align-items: center; gap: 5px;
}
.hd-refresh:active { transform: scale(0.96); }
.hd-refresh svg { width: 13px; height: 13px; }

.tabs {
  display: flex; gap: 0;
  border-top: 1px solid var(--border);
  margin: 0 -16px;
}
.tab {
  flex: 1;
  background: none; border: none;
  color: var(--text-3);
  font: inherit; font-size: 14px; font-weight: 600;
  padding: 12px 8px;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: color 0.15s, border-color 0.15s;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.tab svg { width: 15px; height: 15px; }
.tab.active { color: var(--gold); border-bottom-color: var(--gold); }
.tab .count {
  font-size: 11px; padding: 1px 6px; border-radius: 999px;
  background: var(--bg-elev); color: var(--text-3); font-weight: 700;
}
.tab.active .count { background: var(--gold-soft); color: var(--gold); }

/* ── FEED ──────────────────────────────────────────────────── */
main {
  max-width: 720px;
  margin: 0 auto;
  padding: 12px 12px 0;
}
.state {
  padding: 80px 24px;
  text-align: center;
  color: var(--text-3);
  font-size: 14px;
}
.state.error { color: var(--red); }

.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  margin-bottom: 14px;
  overflow: hidden;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.card.highlighted {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(245,179,1,0.18);
}

.card-head {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 14px 10px;
  flex-wrap: wrap;
}
.priority, .status {
  font-size: 10px; font-weight: 800; letter-spacing: 0.07em; text-transform: uppercase;
  padding: 4px 8px; border-radius: 999px;
  flex-shrink: 0;
}
.p-5 { background: rgba(239,68,68,0.16);  color: #fca5a5; }
.p-4 { background: rgba(249,115,22,0.16); color: #fdba74; }
.p-3 { background: rgba(234,179,8,0.16);  color: #fde68a; }
.p-2 { background: rgba(59,130,246,0.16); color: #93c5fd; }
.p-1 { background: rgba(107,114,128,0.20); color: #d1d5db; }
.p-0 { background: rgba(107,114,128,0.20); color: #d1d5db; }
/* Transport statuses */
.st-pending     { background: rgba(234,179,8,0.16);   color: #fde68a; }
.st-approved    { background: rgba(59,130,246,0.16);  color: #93c5fd; }
.st-completed   { background: rgba(16,185,129,0.16);  color: #86efac; }
/* Legacy + service statuses (head-pill colors; service rows show priority pill, not status pill) */
.st-in_progress { background: rgba(59,130,246,0.16);  color: #93c5fd; }
.st-cancelled   { background: rgba(107,114,128,0.20); color: #d1d5db; }
.st-open        { background: rgba(239,68,68,0.16);   color: #fca5a5; }
.st-resolved    { background: rgba(16,185,129,0.16);  color: #86efac; }
.st-at_shop       { background: rgba(239,68,68,0.16);  color: #fca5a5; }
.st-parts_ordered { background: rgba(249,115,22,0.16); color: #fdba74; }
.st-working_on    { background: rgba(59,130,246,0.16); color: #93c5fd; }
.st-fixed         { background: rgba(16,185,129,0.16); color: #86efac; }
.card-date { font-size: 12px; color: var(--text-3); margin-left: auto; flex-shrink: 0; }

.card-body { padding: 0 14px 12px; }
.asset {
  font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
  font-size: 18px; font-weight: 700; color: var(--gold);
  letter-spacing: 0.02em;
  margin-bottom: 4px;
}
.loc {
  font-size: 14px; font-weight: 600; color: var(--text);
  margin-bottom: 2px;
}
.reporter {
  font-size: 13px; color: var(--text-2);
  margin-bottom: 12px;
}
.reporter .phone-link {
  color: var(--gold); text-decoration: none; font-weight: 600;
  border-bottom: 1px dotted rgba(245,179,1,0.4);
}
.issue {
  font-size: 14px; color: var(--text);
  white-space: pre-wrap;
  word-break: break-word;
  background: var(--bg-elev);
  border-left: 3px solid var(--gold);
  padding: 10px 12px;
  border-radius: 6px;
  margin-bottom: 12px;
}

/* ── TRANSPORT-SPECIFIC ROUTE BLOCK ────────────────────────── */
.route {
  display: grid; grid-template-columns: 1fr; gap: 10px;
  background: var(--bg-elev);
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 12px;
}
.route-leg { display: flex; gap: 10px; }
.route-pin {
  width: 22px; flex-shrink: 0;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
}
.route-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--gold); margin-top: 4px; }
.route-leg.drop .route-dot { background: var(--green); }
.route-line {
  flex: 1;
  width: 2px;
  background: linear-gradient(180deg, var(--gold), var(--green));
  margin: 2px 0;
}
.route-text { flex: 1; min-width: 0; }
.route-label {
  font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--text-3); margin-bottom: 2px;
}
.route-loc { font-size: 14px; color: var(--text); font-weight: 600; word-break: break-word; }
.route-contact { font-size: 12px; color: var(--text-2); margin-top: 3px; }
.route-contact .phone-link {
  color: var(--gold); text-decoration: none;
  border-bottom: 1px dotted rgba(245,179,1,0.4);
}
.route-time { font-size: 12px; color: var(--text-3); margin-top: 4px; font-feature-settings: "tnum"; }

/* ── PHOTO GRID ────────────────────────────────────────────── */
.photos {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 4px;
  border-radius: 10px;
  overflow: hidden;
}
.photo {
  aspect-ratio: 1;
  background: #000;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}
.photo img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.2s;
}
.photo:active img { transform: scale(0.97); }
.no-photos {
  font-size: 12px; color: var(--text-3); font-style: italic;
  padding: 6px 0;
}

/* ── STATUS EDITOR ─────────────────────────────────────────── */
.status-bar {
  margin-top: 12px;
  padding: 10px 12px;
  background: var(--bg-elev);
  border-radius: 10px;
  display: flex; flex-direction: column; gap: 8px;
}
.status-label {
  font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--text-3);
}
.status-chips {
  display: flex; flex-wrap: wrap; gap: 6px;
}
.chip {
  background: var(--bg-card);
  border: 1px solid var(--border-strong);
  color: var(--text-2);
  font: inherit; font-size: 12px; font-weight: 600;
  padding: 7px 11px; border-radius: 999px;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s, color 0.15s, transform 0.15s;
}
.chip:active { transform: scale(0.96); }
.chip.selected {
  background: var(--gold-soft);
  border-color: var(--gold);
  color: var(--gold);
}
.chip.pending {
  background: transparent;
  border-color: var(--gold);
  border-style: dashed;
  color: var(--gold);
}
.status-actions {
  display: flex; align-items: center; gap: 10px;
}
.status-save {
  background: var(--gold); color: #000;
  border: none; border-radius: 8px;
  padding: 8px 16px; font: inherit; font-size: 13px; font-weight: 700;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.15s;
}
.status-save:active { transform: scale(0.97); }
.status-save:disabled {
  background: var(--bg-card); color: var(--text-3); cursor: not-allowed; opacity: 0.7;
}
.status-msg {
  font-size: 12px; font-weight: 600;
}
.status-msg.ok  { color: var(--green); }
.status-msg.err { color: var(--red); }

/* Resolution drawer (only visible when pending = terminal status) */
.resolution {
  display: flex; flex-direction: column; gap: 8px;
  padding: 10px;
  background: var(--bg-card);
  border: 1px dashed var(--border-strong);
  border-radius: 8px;
}
.res-notes {
  width: 100%;
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 10px;
  font: inherit; font-size: 13px;
  resize: vertical;
  min-height: 60px;
  box-sizing: border-box;
  outline: none;
}
.res-notes:focus { border-color: var(--gold); }
.res-photo-row {
  display: flex; align-items: center; gap: 10px;
}
.res-photo-btn {
  background: none;
  border: 1px solid var(--border-strong); color: var(--text-2);
  font: inherit; font-size: 12px; font-weight: 600;
  padding: 7px 11px; border-radius: 8px;
  cursor: pointer;
}
.res-photo-btn:active { transform: scale(0.97); }
.res-photo-name { font-size: 12px; color: var(--text-3); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* Sign-off / last-update line under each card */
.mod-line {
  font-size: 11px; color: var(--text-3);
  margin-top: 2px;
}
.mod-line strong { color: var(--text-2); font-weight: 600; }

/* Completed/resolved callout (read-only, replaces issue once finished) */
.resolved {
  background: rgba(16,185,129,0.08);
  border-left: 3px solid var(--green);
  border-radius: 6px;
  padding: 10px 12px;
  margin-bottom: 12px;
}
.resolved-label {
  font-size: 10px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--green); margin-bottom: 4px;
}
.resolved-notes {
  font-size: 13px; color: var(--text);
  white-space: pre-wrap; word-break: break-word;
}
.resolved-photo {
  margin-top: 8px;
}
.resolved-photo img {
  max-width: 140px; max-height: 100px; object-fit: cover;
  border-radius: 6px; cursor: pointer;
  border: 1px solid var(--border-strong);
}

/* ── DESKTOP TWEAKS ────────────────────────────────────────── */
@media (min-width: 720px) {
  .photos { grid-template-columns: repeat(4, 1fr); }
  main { padding: 18px 18px 0; }
  .card { margin-bottom: 18px; }
}

/* ── LIGHTBOX ──────────────────────────────────────────────── */
.lb {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.96);
  display: none;
  align-items: center; justify-content: center;
  z-index: 100;
  touch-action: pan-y pinch-zoom;
}
.lb.open { display: flex; }
.lb-stage {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  padding: env(safe-area-inset-top, 12px) 12px env(safe-area-inset-bottom, 12px);
}
.lb-img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
  user-select: none;
  -webkit-user-drag: none;
}
.lb-btn {
  position: absolute;
  background: rgba(20,20,24,0.7);
  border: 1px solid rgba(255,255,255,0.15);
  color: #fff;
  width: 44px; height: 44px; border-radius: 22px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 22px; line-height: 1;
  -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px);
}
.lb-btn:active { transform: scale(0.94); }
.lb-close { top: calc(env(safe-area-inset-top, 12px) + 12px); right: 12px; font-size: 18px; }
.lb-prev  { left: 8px;  top: 50%; transform: translateY(-50%); }
.lb-next  { right: 8px; top: 50%; transform: translateY(-50%); }
.lb-caption {
  position: absolute;
  bottom: calc(env(safe-area-inset-bottom, 12px) + 14px);
  left: 50%; transform: translateX(-50%);
  font-size: 13px; color: rgba(255,255,255,0.85);
  background: rgba(0,0,0,0.5); padding: 6px 12px; border-radius: 999px;
  font-feature-settings: "tnum";
  -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px);
}

.footer {
  text-align: center;
  font-size: 11px;
  color: var(--text-3);
  padding: 32px 16px 16px;
}
</style>
</head>
<body>

<header>
  <div class="hd-row">
    <div class="hd-logo"><img src="willpower-logo.png" alt="Will Power Excavation"></div>
    <div>
      <div class="hd-title">Field Reports</div>
      <div class="hd-sub" id="hdsub">Loading…</div>
    </div>
    <button class="hd-refresh" onclick="loadCurrentTab()" title="Refresh">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 4v5h-5"/></svg>
      Refresh
    </button>
  </div>
  <div class="tabs">
    <button class="tab active" data-tab="service" onclick="switchTab('service')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
      Service <span class="count" id="cnt-service">·</span>
    </button>
    <button class="tab" data-tab="transport" onclick="switchTab('transport')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 18V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v11a1 1 0 0 0 1 1h2"/><path d="M15 18H9"/><path d="M19 18h2a1 1 0 0 0 1-1v-3.65a1 1 0 0 0-.22-.624l-3.48-4.35A1 1 0 0 0 17.52 8H14"/><circle cx="17" cy="18" r="2"/><circle cx="7" cy="18" r="2"/></svg>
      Transport <span class="count" id="cnt-transport">·</span>
    </button>
  </div>
</header>

<main id="feed">
  <div class="state">Loading reports…</div>
</main>

<div class="footer">Will Power Excavation &middot; Field Reports</div>

<!-- ── LIGHTBOX ──────────────────────────────────────────────── -->
<div class="lb" id="lb" onclick="lbBackdrop(event)">
  <div class="lb-stage">
    <img class="lb-img" id="lbImg" alt="" draggable="false">
  </div>
  <button class="lb-btn lb-close" onclick="closeLb()" aria-label="Close">&times;</button>
  <button class="lb-btn lb-prev"  onclick="prevLb()"  aria-label="Previous">&#10094;</button>
  <button class="lb-btn lb-next"  onclick="nextLb()"  aria-label="Next">&#10095;</button>
  <div class="lb-caption" id="lbCap">1 / 1</div>
</div>

<script>
// ── CONFIG ───────────────────────────────────────────────────
const SUPABASE_URL = 'https://tunkyqkgqzkgrbgrtroy.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR1bmt5cWtncXprZ3JiZ3J0cm95Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4OTk3NDMsImV4cCI6MjA5MDQ3NTc0M30.JE6LtWo9FhAvLpXOQnj2YWPatGMJo8ho3z6ghn7sc2w';
const TBL_SERVICE   = 'wp_service_requests';
const TBL_TRANSPORT = 'wp_transport_requests';
const LIMIT = 200;

const PRIORITY_LABELS = ['', 'Minimal', 'Low', 'Medium', 'High', 'Critical'];

// Editable status options. The `code` is what gets written to Supabase; `label` is what users see.
const SERVICE_STATUSES = [
  { code: 'at_shop',       label: 'At Shop' },
  { code: 'parts_ordered', label: 'Parts Ordered' },
  { code: 'working_on',    label: 'Working On' },
  { code: 'fixed',         label: 'Fixed' },
];
const TRANSPORT_STATUSES = [
  { code: 'pending',   label: 'Pending' },
  { code: 'approved',  label: 'Approved' },
  { code: 'completed', label: 'Completed' },
];

// Map legacy / inbound status strings onto the editable codes above so existing rows show up correctly.
const STATUS_ALIASES = {
  service: {
    'open': 'at_shop',
    'in_progress': 'working_on',
    'in progress': 'working_on',
    'resolved': 'fixed',
    'closed': 'fixed'
  },
  transport: {
    'in_progress': 'approved',
    'in progress': 'approved',
    'scheduled': 'approved',
    'cancelled': 'pending'
  }
};

function normalizeStatus(kind, raw) {
  if (!raw) return null;
  const k = String(raw).toLowerCase().trim().replace(/\s+/g, '_');
  const aliases = STATUS_ALIASES[kind] || {};
  return aliases[k] || k;
}
function statusLabel(kind, code) {
  const list = kind === 'service' ? SERVICE_STATUSES : TRANSPORT_STATUSES;
  const found = list.find(function(s) { return s.code === code; });
  return found ? found.label : (code || '');
}
// The two "terminal" statuses that trigger a resolution drawer (notes + optional photo).
const TERMINAL_STATUSES = { service: 'fixed', transport: 'completed' };

function statusBarHtml(kind, id, currentStatus, modBy, modAt) {
  const options = kind === 'service' ? SERVICE_STATUSES : TRANSPORT_STATUSES;
  const current = normalizeStatus(kind, currentStatus);
  const chips = options.map(function(o) {
    const cls = o.code === current ? ' selected' : '';
    return '<button type="button" class="chip' + cls + '" data-code="' + esc(o.code) + '" onclick="onChipClick(this)">' + esc(o.label) + '</button>';
  }).join('');
  const modLine = modBy
    ? '<div class="mod-line">Last update by <strong>' + esc(modBy) + '</strong> · ' + esc(fmtAgoShort(modAt)) + '</div>'
    : '';
  return '<div class="status-bar" data-kind="' + esc(kind) + '" data-id="' + esc(id) + '" data-original="' + esc(current || '') + '">' +
    '<div class="status-label">Status</div>' +
    '<div class="status-chips">' + chips + '</div>' +
    '<div class="resolution" style="display:none">' +
      '<textarea class="res-notes" placeholder="Resolution notes — what was done (required)" rows="2"></textarea>' +
      '<div class="res-photo-row">' +
        '<button type="button" class="res-photo-btn" onclick="this.nextElementSibling.click()">+ Completion photo (optional)</button>' +
        '<input type="file" accept="image/*" class="res-photo-input" style="display:none" onchange="onResPhotoPicked(this)">' +
        '<span class="res-photo-name"></span>' +
      '</div>' +
    '</div>' +
    '<div class="status-actions">' +
      '<button type="button" class="status-save" disabled onclick="onSaveStatus(this)">Save</button>' +
      '<span class="status-msg"></span>' +
    '</div>' +
    modLine +
  '</div>';
}

function onChipClick(btn) {
  const bar = btn.closest('.status-bar');
  const kind = bar.getAttribute('data-kind');
  const newCode = btn.getAttribute('data-code');
  const origCode = bar.getAttribute('data-original') || '';
  bar.querySelectorAll('.chip').forEach(function(c) { c.classList.remove('selected', 'pending'); });
  if (newCode === origCode) {
    btn.classList.add('selected');
    bar.removeAttribute('data-pending');
  } else {
    btn.classList.add('pending');
    bar.setAttribute('data-pending', newCode);
    const origChip = bar.querySelector('.chip[data-code="' + CSS.escape(origCode) + '"]');
    if (origChip) origChip.classList.add('selected');
  }
  // Show resolution drawer only when pending status is the terminal one (fixed/completed).
  const resDrawer = bar.querySelector('.resolution');
  if (resDrawer) {
    resDrawer.style.display = (newCode === TERMINAL_STATUSES[kind] && newCode !== origCode) ? 'flex' : 'none';
  }
  const save = bar.querySelector('.status-save');
  save.disabled = !bar.getAttribute('data-pending');
  const msg = bar.querySelector('.status-msg');
  msg.textContent = ''; msg.className = 'status-msg';
}

// Stash the picked file on the bar so save can read it without DOM hunting.
function onResPhotoPicked(input) {
  const bar = input.closest('.status-bar');
  const file = input.files && input.files[0];
  const nameSpan = bar.querySelector('.res-photo-name');
  if (!file) { nameSpan.textContent = ''; bar._resPhoto = null; return; }
  bar._resPhoto = file;
  nameSpan.textContent = file.name;
}

// Upload one file to the wp-service-photos bucket; return public URL.
async function uploadCompletionPhoto(file) {
  const ext = ((file.name || '').match(/\.([a-zA-Z0-9]+)$/) || [, 'jpg'])[1].toLowerCase();
  const path = 'completion-' + Date.now() + '-' + Math.random().toString(36).slice(2, 8) + '.' + ext;
  const url = SUPABASE_URL + '/storage/v1/object/wp-service-photos/' + path;
  const res = await fetch(url, {
    method: 'POST',
    headers: {
      'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
      'apikey': SUPABASE_ANON_KEY,
      'Content-Type': file.type || 'application/octet-stream',
      'x-upsert': 'false'
    },
    body: file
  });
  if (!res.ok) {
    const t = await res.text().catch(function(){return '';});
    throw new Error('Photo upload failed: ' + res.status + (t ? ' — ' + t.slice(0, 100) : ''));
  }
  return SUPABASE_URL + '/storage/v1/object/public/wp-service-photos/' + path;
}

async function onSaveStatus(btn) {
  const bar = btn.closest('.status-bar');
  const kind = bar.getAttribute('data-kind');
  const id = bar.getAttribute('data-id');
  const newStatus = bar.getAttribute('data-pending');
  if (!newStatus) return;
  const msg = bar.querySelector('.status-msg');
  msg.textContent = ''; msg.className = 'status-msg';

  // Resolution-required gate: if moving to terminal status, demand notes first.
  const isTerminal = newStatus === TERMINAL_STATUSES[kind];
  let resNotes = '';
  let resFile = null;
  if (isTerminal) {
    const notesEl = bar.querySelector('.res-notes');
    resNotes = (notesEl && notesEl.value || '').trim();
    if (!resNotes) {
      msg.textContent = '✕ Resolution notes required';
      msg.className = 'status-msg err';
      if (notesEl) notesEl.focus();
      return;
    }
    resFile = bar._resPhoto || null;
  }

  // Get / prompt for the signer's name.
  const signedBy = getSignedBy();
  if (!signedBy) {
    msg.textContent = '✕ Name required to save';
    msg.className = 'status-msg err';
    return;
  }

  btn.disabled = true; btn.textContent = 'Saving…';
  try {
    // Upload completion photo first (if any). Fail loud — we don't want a saved
    // status pointing at a photo that never made it to Storage.
    let completionPhotoUrl = null;
    if (resFile) {
      btn.textContent = 'Uploading photo…';
      completionPhotoUrl = await uploadCompletionPhoto(resFile);
    }

    btn.textContent = 'Saving…';
    const table = kind === 'service' ? TBL_SERVICE : TBL_TRANSPORT;
    const url = SUPABASE_URL + '/rest/v1/' + table + '?id=eq.' + encodeURIComponent(id);

    // Build patch body. Always stamp last_modified_*; on terminal, also set
    // resolver_notes + resolved_at (service) or push notes/photo into fields (transport).
    const nowIso = new Date().toISOString();
    const body = {
      status: newStatus,
      last_modified_by: signedBy,
      last_modified_at: nowIso
    };
    if (isTerminal) {
      if (kind === 'service') {
        body.resolver_notes = resNotes;
        body.resolved_at = nowIso;
        // Append completion photo URL onto the existing photos array, if present.
        if (completionPhotoUrl) {
          const card = bar.closest('.card');
          let existing = [];
          try { existing = JSON.parse(card.getAttribute('data-photos') || '[]'); } catch (e) {}
          body.photos = existing.concat([completionPhotoUrl]);
        }
      } else {
        // transport: stash completion data in the fields jsonb so we don't migrate.
        const card = bar.closest('.card');
        let existingFields = {};
        try { existingFields = JSON.parse(card.getAttribute('data-fields') || '{}'); } catch (e) {}
        body.fields = Object.assign({}, existingFields, {
          completion_notes: resNotes,
          completed_at: nowIso
        });
        if (completionPhotoUrl) body.fields.completion_photo = completionPhotoUrl;
      }
    }

    const res = await fetch(url, {
      method: 'PATCH',
      headers: {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify(body)
    });
    if (!res.ok) {
      const txt = await res.text().catch(function(){ return ''; });
      throw new Error('HTTP ' + res.status + (txt ? ': ' + txt.slice(0, 100) : ''));
    }

    // Update DOM to reflect the save.
    bar.setAttribute('data-original', newStatus);
    bar.removeAttribute('data-pending');
    bar.querySelectorAll('.chip').forEach(function(c) { c.classList.remove('selected', 'pending'); });
    const newChip = bar.querySelector('.chip[data-code="' + CSS.escape(newStatus) + '"]');
    if (newChip) newChip.classList.add('selected');
    // Hide the resolution drawer + clear it
    const resDrawer = bar.querySelector('.resolution');
    if (resDrawer) {
      resDrawer.style.display = 'none';
      const nEl = bar.querySelector('.res-notes'); if (nEl) nEl.value = '';
      const nameSpan = bar.querySelector('.res-photo-name'); if (nameSpan) nameSpan.textContent = '';
      bar._resPhoto = null;
    }
    // If this was a terminal save, inject a resolved-block inline so the user sees their notes immediately.
    if (isTerminal) {
      const card = bar.closest('.card');
      const cardBody = card && card.querySelector('.card-body');
      const existingResolved = cardBody && cardBody.querySelector('.resolved');
      if (existingResolved) existingResolved.remove();
      const label = kind === 'service' ? 'Fixed' : 'Completed';
      const resolvedHtml = '<div class="resolved">' +
        '<div class="resolved-label">' + label + ' · Today · just now</div>' +
        '<div class="resolved-notes">' + esc(resNotes) + '</div>' +
        (completionPhotoUrl
          ? '<div class="resolved-photo"><img src="' + esc(completionPhotoUrl) + '" alt="Completion photo"></div>'
          : '') +
      '</div>';
      // Insert above the photo grid (service) or above the status bar (transport)
      const insertBefore = cardBody && (cardBody.querySelector('.photos') || cardBody.querySelector('.no-photos') || bar);
      if (insertBefore) insertBefore.insertAdjacentHTML('beforebegin', resolvedHtml);
    }
    // Update modified-by line (replace or add)
    let modLine = bar.querySelector('.mod-line');
    if (!modLine) {
      modLine = document.createElement('div');
      modLine.className = 'mod-line';
      bar.appendChild(modLine);
    }
    modLine.innerHTML = 'Last update by <strong>' + esc(signedBy) + '</strong> · just now';
    // Update header pill
    const card = bar.closest('.card');
    const headPill = card && card.querySelector('.card-head .status');
    if (headPill) {
      headPill.className = 'status st-' + newStatus;
      headPill.textContent = statusLabel(kind, newStatus);
    }
    // Keep the cache in sync
    if (cachedRows[kind]) {
      const row = cachedRows[kind].find(function(r) { return r.id === id; });
      if (row) {
        row.status = newStatus;
        row.last_modified_by = signedBy;
        row.last_modified_at = nowIso;
        if (isTerminal) {
          if (kind === 'service') {
            row.resolver_notes = resNotes;
            row.resolved_at = nowIso;
            if (completionPhotoUrl) row.photos = (row.photos || []).concat([completionPhotoUrl]);
          } else {
            row.fields = Object.assign({}, row.fields || {}, { completion_notes: resNotes, completed_at: nowIso });
            if (completionPhotoUrl) row.fields.completion_photo = completionPhotoUrl;
          }
        }
      }
    }
    msg.textContent = '✓ Saved';
    msg.className = 'status-msg ok';
    btn.textContent = 'Save';
    setTimeout(function() { msg.textContent = ''; msg.className = 'status-msg'; }, 2500);
  } catch (err) {
    btn.disabled = false; btn.textContent = 'Save';
    msg.textContent = '✕ ' + (err.message || 'Save failed');
    msg.className = 'status-msg err';
  }
}

// ── STATE ────────────────────────────────────────────────────
let currentTab = 'service'; // 'service' | 'transport'
let cachedRows = { service: null, transport: null };

// ── HELPERS ──────────────────────────────────────────────────
function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
const INDY_TZ = 'America/Indiana/Indianapolis';

function indyDateParts(iso) {
  if (!iso) return null;
  const d = new Date(iso);
  if (isNaN(d)) return null;
  return { d: d, parts: d.toLocaleDateString('en-US', { timeZone: INDY_TZ, year: 'numeric', month: '2-digit', day: '2-digit' }) };
}

// Returns "Jun 7, 2026 · 3 days ago" (or "Today · 10:42 AM" / "Yesterday · 4:15 PM") in Indianapolis time.
function fmtAgo(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d)) return '';
  const datePart = d.toLocaleDateString('en-US', { timeZone: INDY_TZ, month: 'short', day: 'numeric', year: 'numeric' });
  const timePart = d.toLocaleTimeString('en-US', { timeZone: INDY_TZ, hour: 'numeric', minute: '2-digit' });
  // Compute calendar-day difference in Indianapolis (not 24h spans).
  const indyDayStr = function(dt) { return dt.toLocaleDateString('en-US', { timeZone: INDY_TZ, year: 'numeric', month: '2-digit', day: '2-digit' }); };
  const parseMDY = function(s) { const p = s.split('/'); return new Date(+p[2], +p[0] - 1, +p[1]); };
  const days = Math.round((parseMDY(indyDayStr(new Date())) - parseMDY(indyDayStr(d))) / 86400000);
  let agoStr;
  if (days === 0) agoStr = 'Today · ' + timePart;
  else if (days === 1) agoStr = 'Yesterday · ' + timePart;
  else if (days < 0) agoStr = 'In ' + Math.abs(days) + ' days';
  else agoStr = days + ' days ago';
  return datePart + ' · ' + agoStr;
}

function fmtDateTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleString('en-US', {
    timeZone: INDY_TZ,
    month: 'short', day: 'numeric', year: 'numeric',
    hour: 'numeric', minute: '2-digit'
  });
}

// Shorter form for "modified by X · 2h ago" line — keeps the modified line compact.
function fmtAgoShort(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const diffMin = Math.floor((Date.now() - d.getTime()) / 60000);
  if (diffMin < 1) return 'just now';
  if (diffMin < 60) return diffMin + 'm ago';
  if (diffMin < 60 * 24) return Math.floor(diffMin / 60) + 'h ago';
  if (diffMin < 60 * 24 * 7) return Math.floor(diffMin / (60 * 24)) + 'd ago';
  return d.toLocaleDateString('en-US', { timeZone: INDY_TZ, month: 'short', day: 'numeric' });
}

// ── SIGN-OFF NAME (cached per browser/session) ────────────────
const SIGNED_BY_KEY = 'wp-reports-signed-by';
function getSignedBy() {
  let name = localStorage.getItem(SIGNED_BY_KEY) || '';
  name = name.trim();
  if (name) return name;
  const input = prompt('Your name (used to sign off changes on this page):');
  if (input && input.trim()) {
    localStorage.setItem(SIGNED_BY_KEY, input.trim());
    return input.trim();
  }
  return null;
}
function phoneLink(p) {
  if (!p) return '';
  const digits = String(p).replace(/\D/g, '');
  if (digits.length < 7) return esc(p);
  return '<a class="phone-link" href="tel:' + esc(digits) + '">' + esc(p) + '</a>';
}
function extractUrls(photos) {
  if (!Array.isArray(photos)) return [];
  return photos.map(function(p) {
    if (typeof p === 'string') return p;
    if (p && typeof p === 'object') return p.url || p.data || p.data_url || null;
    return null;
  }).filter(Boolean);
}
function setHdSub(text) { document.getElementById('hdsub').textContent = text; }

// ── TAB SWITCH ───────────────────────────────────────────────
function switchTab(name) {
  if (currentTab === name && cachedRows[name]) {
    return; // already showing
  }
  currentTab = name;
  document.querySelectorAll('.tab').forEach(function(b) {
    b.classList.toggle('active', b.getAttribute('data-tab') === name);
  });
  // Update URL so the tab choice is shareable
  const params = new URLSearchParams(location.search);
  params.set('type', name);
  history.replaceState(null, '', location.pathname + '?' + params.toString());
  loadCurrentTab();
}

function loadCurrentTab() {
  if (currentTab === 'service') return loadService();
  return loadTransport();
}

async function loadService() {
  const feed = document.getElementById('feed');
  feed.innerHTML = '<div class="state">Loading service reports…</div>';

  try {
    const url = SUPABASE_URL + '/rest/v1/' + TBL_SERVICE +
      '?select=id,asset_id,reported_by,reporter_phone,location,jobsite_address,whats_wrong,priority_level,status,photos,received_at,submitted_at,last_modified_by,last_modified_at,resolver_notes,resolved_at' +

              '<div class="resolved-notes">' + esc(r.resolver_notes) + '</div>' +

}

// ── FETCH ────────────────────────────────────────────────────
async function fetchRest(url) {
  const res = await fetch(url, {
    headers: {
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': 'Bearer ' + SUPABASE_ANON_KEY
    },
    cache: 'no-store'
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

// ── DEEP LINK ?type=service&id=<uuid> ────────────────────────
function scrollToDeepLink() {
  const params = new URLSearchParams(location.search);
  const id = params.get('id');
  if (!id) return;
  const el = document.querySelector('.card[data-id="' + CSS.escape(id) + '"]');
  if (!el) return;
  setTimeout(function() {
    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    el.classList.add('highlighted');
  }, 50);
}

// ── LIGHTBOX ─────────────────────────────────────────────────
let lbPhotos = [];
let lbIdx = 0;
function openLb(cardId, idx) {
  const card = document.querySelector('.card[data-id="' + CSS.escape(cardId) + '"]');
  if (!card) return;
  try { lbPhotos = JSON.parse(card.getAttribute('data-photos') || '[]'); } catch (e) { lbPhotos = []; }
  if (!lbPhotos.length) return;
  lbIdx = idx;
  showLb();
  document.body.style.overflow = 'hidden';
}
function showLb() {
  document.getElementById('lbImg').src = lbPhotos[lbIdx];
  document.getElementById('lbCap').textContent = (lbIdx + 1) + ' / ' + lbPhotos.length;
  document.getElementById('lb').classList.add('open');
}
function closeLb() {
  document.getElementById('lb').classList.remove('open');
  document.body.style.overflow = '';
}
function nextLb() { lbIdx = (lbIdx + 1) % lbPhotos.length; showLb(); }
function prevLb() { lbIdx = (lbIdx - 1 + lbPhotos.length) % lbPhotos.length; showLb(); }
function lbBackdrop(e) {
  if (e.target === document.getElementById('lb') || e.target.classList.contains('lb-stage')) closeLb();
}
document.addEventListener('keydown', function(e) {
  if (!document.getElementById('lb').classList.contains('open')) return;
  if (e.key === 'Escape') closeLb();
  if (e.key === 'ArrowRight') nextLb();
  if (e.key === 'ArrowLeft') prevLb();
});

let touchStartX = 0, touchStartY = 0;
document.getElementById('lb').addEventListener('touchstart', function(e) {
  if (e.touches.length !== 1) return;
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });
document.getElementById('lb').addEventListener('touchend', function(e) {
  if (e.changedTouches.length !== 1) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.5) {
    if (dx < 0) nextLb(); else prevLb();
  }
}, { passive: true });

// ── KICK OFF ─────────────────────────────────────────────────
(function init() {
  // Honor ?type=transport or ?type=service in URL
  const params = new URLSearchParams(location.search);
  const t = (params.get('type') || '').toLowerCase();
  if (t === 'transport') {
    currentTab = 'transport';
    document.querySelectorAll('.tab').forEach(function(b) {
      b.classList.toggle('active', b.getAttribute('data-tab') === 'transport');
    });
  }
  // Prefetch the other tab's count in background so the badges show numbers
  loadCurrentTab().then(function() {
    const other = currentTab === 'service' ? 'transport' : 'service';
    const tbl = other === 'service' ? TBL_SERVICE : TBL_TRANSPORT;
    fetchRest(SUPABASE_URL + '/rest/v1/' + tbl + '?select=id&limit=' + LIMIT)
      .then(function(rows) {
        document.getElementById('cnt-' + other).textContent = rows.length;
        cachedRows[other] = null; // don't cache rows from this lightweight fetch
      }).catch(function() {});
  });
})();
</script>
